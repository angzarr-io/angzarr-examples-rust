name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [client-updated]  # Triggered by angzarr-client-rust on update
  workflow_dispatch:  # Allow manual trigger

env:
  CARGO_TERM_COLOR: always
  EXAMPLES_PROTO_ROOT: ${{ github.workspace }}/examples-proto
  ANGZARR_PROTO_ROOT: ${{ github.workspace }}/angzarr-proto
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/angzarr-io/examples-rust
  # Coordinator version for acceptance tests - pin to specific release
  COORDINATOR_VERSION: v0.1.3
  # Opt into Node.js 24 for GitHub Actions (required after June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Export protos from Buf registry
        run: |
          buf export buf.build/angzarr/examples -o examples-proto
          buf export buf.build/angzarr/angzarr -o angzarr-proto

      - name: Update client dependency (on dispatch)
        if: github.event_name == 'repository_dispatch'
        run: cargo update angzarr-client

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Lint
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --check

  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/

      - name: Generate image tag
        id: tag
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "tag=pr-${PR_NUM}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push with skaffold
        id: build
        env:
          SKAFFOLD_DEFAULT_REPO: ${{ env.REGISTRY }}/angzarr-io
          DOCKER_BUILDKIT: "1"
        run: |
          # Use custom tag instead of git commit for consistency
          skaffold build \
            --profile=ci \
            --tag=${{ steps.tag.outputs.tag }} \
            --file-output=build.json

          echo "Built images:"
          jq -r '.builds[].tag' build.json

          # Output digest for verification
          echo "digest=$(jq -r '.builds[0].tag' build.json | cut -d: -f2)" >> $GITHUB_OUTPUT

      - name: Tag latest (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          # Tag all images as latest
          jq -r '.builds[].tag' build.json | while read img; do
            LATEST_TAG="${img%:*}:latest"
            echo "Tagging $img as $LATEST_TAG"
            docker tag "$img" "$LATEST_TAG"
            docker push "$LATEST_TAG"
          done

  # Compute image tag for acceptance tests
  compute-tag:
    name: Compute Image Tag
    runs-on: ubuntu-latest
    needs: build-images
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      images-json: ${{ steps.images.outputs.json }}
      coordinator-version: ${{ steps.coord.outputs.version }}
    steps:
      - name: Output coordinator version
        id: coord
        run: echo "version=${{ env.COORDINATOR_VERSION }}" >> $GITHUB_OUTPUT

      - name: Generate image tag
        id: tag
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "tag=pr-${PR_NUM}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build images JSON
        id: images
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          # Build JSON object of all example images
          JSON=$(cat <<EOF
          {
            "agg-player": "${PREFIX}-agg-player:${TAG}",
            "agg-table": "${PREFIX}-agg-table:${TAG}",
            "agg-hand": "${PREFIX}-agg-hand:${TAG}",
            "saga-table-hand": "${PREFIX}-saga-table-hand:${TAG}",
            "saga-table-player": "${PREFIX}-saga-table-player:${TAG}",
            "saga-hand-table": "${PREFIX}-saga-hand-table:${TAG}",
            "saga-hand-player": "${PREFIX}-saga-hand-player:${TAG}",
            "pmg-hand-flow": "${PREFIX}-pmg-hand-flow:${TAG}",
            "prj-output": "${PREFIX}-prj-output:${TAG}",
            "upc-player": "${PREFIX}-upc-player:${TAG}"
          }
          EOF
          )
          echo "json=$(echo "$JSON" | jq -c '.')" >> $GITHUB_OUTPUT

  # Call reusable acceptance test workflow
  acceptance-test:
    name: Acceptance Tests
    needs: [build-images, compute-tag]
    uses: ./.github/workflows/acceptance-callable.yml
    with:
      # Use just-pushed example images
      example-images: ${{ needs.compute-tag.outputs.images-json }}
      # Coordinator version (passed via job output since env context unavailable in uses)
      coordinator-version: ${{ needs.compute-tag.outputs.coordinator-version }}
      examples-ref: ${{ github.ref }}
    secrets: inherit

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [test, build-images, acceptance-test]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Images | ${{ needs.build-images.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Acceptance Tests | ${{ needs.acceptance-test.result }} |" >> $GITHUB_STEP_SUMMARY

          # All jobs must pass to merge
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build-images.result }}" != "success" ] || \
             [ "${{ needs.acceptance-test.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
