name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  EXAMPLES_PROTO_ROOT: ${{ github.workspace }}/examples-proto

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    container: ghcr.io/angzarr-io/angzarr-rust:latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Export example protos from Buf registry
        run: |
          curl -sSL https://github.com/bufbuild/buf/releases/latest/download/buf-Linux-x86_64 -o buf
          chmod +x buf
          sudo mv buf /usr/local/bin/
          buf export buf.build/angzarr/examples -o examples-proto

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace

      - name: Test (unit)
        run: cargo test --workspace

      - name: Lint
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --check
