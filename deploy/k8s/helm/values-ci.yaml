# CI-specific overrides for Helm deployment
# Used in addition to values.yaml when deploying in CI

# Image pull secret for GHCR
imagePullSecrets:
  - name: ghcr-pull-secret

# Use IfNotPresent since images are pre-loaded into Kind
images:
  aggregate:
    pullPolicy: IfNotPresent
  saga:
    pullPolicy: IfNotPresent
  projector:
    pullPolicy: IfNotPresent
  processManager:
    pullPolicy: IfNotPresent

# Override applications with pullPolicy for CI (images loaded into Kind)
applications:
  business:
    - name: agg-player
      image:
        repository: ghcr.io/angzarr-io/examples-rust-agg-player
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "player"
      port: 50001

    - name: agg-table
      image:
        repository: ghcr.io/angzarr-io/examples-rust-agg-table
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "table"
      port: 50002

    - name: agg-hand
      image:
        repository: ghcr.io/angzarr-io/examples-rust-agg-hand
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "hand"
      port: 50003

  sagas:
    - name: saga-table-hand
      image:
        repository: ghcr.io/angzarr-io/examples-rust-saga-table-hand
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "table-hand"
      port: 50011
      topics:
        - "table.*"

    - name: saga-hand-player
      image:
        repository: ghcr.io/angzarr-io/examples-rust-saga-hand-player
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "hand-player"
      port: 50014
      topics:
        - "hand.*"

  projectors:
    - name: prj-output
      image:
        repository: ghcr.io/angzarr-io/examples-rust-prj-output
        tag: "latest"
        pullPolicy: IfNotPresent
      domain: "output"
      port: 50030
      topics:
        - "player.*"
        - "table.*"
        - "hand.*"
