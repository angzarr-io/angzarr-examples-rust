# Poker Example - Rust implementation
# Deploy: helm upgrade --install angzarr ../angzarr/deploy/k8s/helm/angzarr -f deploy/k8s/helm/values.yaml -n angzarr-test --create-namespace

# Enable messaging for sagas/projectors
messaging:
  amqp:
    enabled: true
    host: "rabbitmq"
    url: "amqp://guest:guest@rabbitmq:5672/%2F"

# Storage configuration
storage:
  postgres:
    host: "postgres"
    uri: "postgres://angzarr:angzarr-test@postgres:5432/angzarr"

# Enable infrastructure services
infrastructure:
  stream:
    enabled: true
    serviceType: NodePort
    nodePort: 31340
  gateway:
    enabled: true
    serviceType: NodePort
    nodePort: 30084
  log:
    enabled: true

# Poker domain applications
applications:
  business:
    - name: agg-player
      image:
        repository: ghcr.io/angzarr-io/examples-rust-agg-player
        tag: "latest"
      domain: "player"
      port: 50001

    - name: agg-table
      image:
        repository: ghcr.io/angzarr-io/examples-rust-agg-table
        tag: "latest"
      domain: "table"
      port: 50002

    - name: agg-hand
      image:
        repository: ghcr.io/angzarr-io/examples-rust-agg-hand
        tag: "latest"
      domain: "hand"
      port: 50003

  sagas:
    - name: saga-table-hand
      image:
        repository: ghcr.io/angzarr-io/examples-rust-saga-table-hand
        tag: "latest"
      domain: "saga-table-hand"
      port: 50011
      topics:
        - "table.*"

    - name: saga-hand-player
      image:
        repository: ghcr.io/angzarr-io/examples-rust-saga-hand-player
        tag: "latest"
      domain: "saga-hand-player"
      port: 50014
      topics:
        - "hand.*"

  projectors:
    - name: prj-output
      image:
        repository: ghcr.io/angzarr-io/examples-rust-prj-output
        tag: "latest"
      domain: "prj-output"
      port: 50030
      topics:
        - "player.*"
        - "table.*"
        - "hand.*"
