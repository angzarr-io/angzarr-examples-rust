# Poker Example - Rust implementation
# Deploy: helm upgrade --install poker oci://ghcr.io/angzarr-io/charts/angzarr -f deploy/k8s/helm/values.yaml -n angzarr-test
#
# Uses angzarr chart defaults for storage (postgres), messaging (rabbitmq), and gateway.
# Only application definitions below.

# Infrastructure services
infrastructure:
  gateway:
    enabled: true
    # Route to player aggregate coordinator for acceptance tests
    grpcTarget: "player-aggregate:1310"

# Poker domain applications
applications:
  business:
    - name: agg-player
      image:
        repository: ghcr.io/angzarr-io/examples-rust-agg-player
        tag: "latest"
      domain: "player"
      port: 50001

    - name: agg-table
      image:
        repository: ghcr.io/angzarr-io/examples-rust-agg-table
        tag: "latest"
      domain: "table"
      port: 50002

    - name: agg-hand
      image:
        repository: ghcr.io/angzarr-io/examples-rust-agg-hand
        tag: "latest"
      domain: "hand"
      port: 50003

    - name: agg-tournament
      image:
        repository: ghcr.io/angzarr-io/examples-rust-agg-tournament
        tag: "latest"
      domain: "tournament"
      port: 50004

  sagas:
    - name: saga-table-hand
      image:
        repository: ghcr.io/angzarr-io/examples-rust-saga-table-hand
        tag: "latest"
      domain: "table-hand"
      port: 50011
      topics:
        - "table.*"

    - name: saga-hand-player
      image:
        repository: ghcr.io/angzarr-io/examples-rust-saga-hand-player
        tag: "latest"
      domain: "hand-player"
      port: 50014
      topics:
        - "hand.*"

  processManagers:
    - name: pmg-hand-flow
      image:
        repository: ghcr.io/angzarr-io/examples-rust-pmg-hand-flow
        tag: "latest"
      domain: "pmg-hand-flow"
      port: 50391
      topics:
        - "table.*"
        - "hand.*"

    - name: pmg-buy-in
      image:
        repository: ghcr.io/angzarr-io/examples-rust-pmg-buy-in
        tag: "latest"
      domain: "pmg-buy-in"
      port: 50392
      topics:
        - "player.*"
        - "table.*"

    - name: pmg-registration
      image:
        repository: ghcr.io/angzarr-io/examples-rust-pmg-registration
        tag: "latest"
      domain: "pmg-registration"
      port: 50393
      topics:
        - "player.*"
        - "tournament.*"

    - name: pmg-rebuy
      image:
        repository: ghcr.io/angzarr-io/examples-rust-pmg-rebuy
        tag: "latest"
      domain: "pmg-rebuy"
      port: 50394
      topics:
        - "player.*"
        - "tournament.*"
        - "table.*"

  projectors:
    - name: prj-output
      image:
        repository: ghcr.io/angzarr-io/examples-rust-prj-output
        tag: "latest"
      domain: "output"
      port: 50030
      topics:
        - "player.*"
        - "table.*"
        - "hand.*"
        - "tournament.*"
