---
# Output Projector (logs game events)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prj-output
  namespace: angzarr-test
  labels:
    app.kubernetes.io/name: prj-output
    app.kubernetes.io/component: projector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prj-output
  template:
    metadata:
      labels:
        app: prj-output
        app.kubernetes.io/component: projector
    spec:
      containers:
        - name: app
          image: ghcr.io/angzarr-io/examples-rust-prj-output:latest
          ports:
            - containerPort: 50090
              name: grpc
          env:
            - name: PORT
              value: "50090"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
        - name: sidecar
          image: ghcr.io/angzarr-io/angzarr-projector:latest
          env:
            - name: ANGZARR__TARGET__DOMAIN
              value: "output"
            - name: ANGZARR__TARGET__ADDRESS
              value: "127.0.0.1:50090"
            - name: ANGZARR_SUBSCRIPTIONS
              value: "player;table;hand"
            - name: ANGZARR__STORAGE__TYPE
              value: "postgres"
            - name: ANGZARR__STORAGE__POSTGRES__URI
              valueFrom:
                configMapKeyRef:
                  name: angzarr-config
                  key: POSTGRES_URI
            - name: ANGZARR__MESSAGING__MESSAGING_TYPE
              value: "amqp"
            - name: ANGZARR__MESSAGING__AMQP__URL
              valueFrom:
                configMapKeyRef:
                  name: angzarr-config
                  key: AMQP_URL
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
# Gateway service (routes commands to aggregates)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: angzarr-test
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        app.kubernetes.io/component: infrastructure
    spec:
      serviceAccountName: gateway
      containers:
        - name: gateway
          image: ghcr.io/angzarr-io/angzarr-grpc-gateway:latest
          ports:
            - containerPort: 9084
              name: grpc
          env:
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: angzarr-test
spec:
  type: NodePort
  ports:
    - name: grpc
      port: 9084
      targetPort: 9084
      nodePort: 30084
  selector:
    app: gateway
---
# Gateway ServiceAccount and RBAC (for service discovery)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway
  namespace: angzarr-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway
  namespace: angzarr-test
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway
  namespace: angzarr-test
subjects:
  - kind: ServiceAccount
    name: gateway
    namespace: angzarr-test
roleRef:
  kind: Role
  name: gateway
  apiGroup: rbac.authorization.k8s.io
