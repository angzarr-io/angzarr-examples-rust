# Poker Example Applications
# Each app runs with an angzarr sidecar for event sourcing
---
# Player Aggregate
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poker-player
  namespace: angzarr-test
  labels:
    app.kubernetes.io/name: poker-player
    app.kubernetes.io/component: aggregate
    angzarr.io/domain: player
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poker-player
  template:
    metadata:
      labels:
        app: poker-player
        app.kubernetes.io/component: aggregate
        angzarr.io/domain: player
    spec:
      containers:
        - name: app
          image: ghcr.io/angzarr-io/examples-rust-agg-player:latest
          ports:
            - containerPort: 50001
              name: grpc
          env:
            - name: PORT
              value: "50001"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
        - name: sidecar
          image: ghcr.io/angzarr-io/angzarr-aggregate:latest
          ports:
            - containerPort: 1310
              name: sidecar-grpc
          env:
            - name: ANGZARR__TARGET__DOMAIN
              value: "player"
            - name: ANGZARR__TARGET__ADDRESS
              value: "127.0.0.1:50001"
            - name: ANGZARR__STORAGE__TYPE
              value: "postgres"
            - name: ANGZARR__STORAGE__POSTGRES__URI
              valueFrom:
                configMapKeyRef:
                  name: angzarr-config
                  key: POSTGRES_URI
            - name: ANGZARR__MESSAGING__MESSAGING_TYPE
              value: "amqp"
            - name: ANGZARR__MESSAGING__AMQP__URL
              valueFrom:
                configMapKeyRef:
                  name: angzarr-config
                  key: AMQP_URL
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: poker-player
  namespace: angzarr-test
spec:
  ports:
    - name: grpc
      port: 1310
      targetPort: 1310
  selector:
    app: poker-player
---
