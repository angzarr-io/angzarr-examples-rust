# Table-Hand Saga (reacts to table events, sends commands to hand)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saga-table-hand
  namespace: angzarr-test
  labels:
    app.kubernetes.io/name: saga-table-hand
    app.kubernetes.io/component: saga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saga-table-hand
  template:
    metadata:
      labels:
        app: saga-table-hand
        app.kubernetes.io/component: saga
    spec:
      containers:
        - name: app
          image: ghcr.io/angzarr-io/examples-rust-saga-table-hand:latest
          ports:
            - containerPort: 50011
              name: grpc
          env:
            - name: PORT
              value: "50011"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
        - name: sidecar
          image: ghcr.io/angzarr-io/angzarr-saga:latest
          env:
            - name: ANGZARR__TARGET__DOMAIN
              value: "table-hand"
            - name: ANGZARR__TARGET__ADDRESS
              value: "127.0.0.1:50011"
            - name: ANGZARR__TARGET__LISTEN_DOMAIN
              value: "table"
            - name: ANGZARR_SUBSCRIPTIONS
              value: "table:*"
            - name: ANGZARR_STATIC_ENDPOINTS
              value: "hand=poker-hand:1310"
            - name: ANGZARR__STORAGE__TYPE
              value: "postgres"
            - name: ANGZARR__STORAGE__POSTGRES__URI
              valueFrom:
                configMapKeyRef:
                  name: angzarr-config
                  key: POSTGRES_URI
            - name: ANGZARR__MESSAGING__MESSAGING_TYPE
              value: "amqp"
            - name: ANGZARR__MESSAGING__AMQP__URL
              valueFrom:
                configMapKeyRef:
                  name: angzarr-config
                  key: AMQP_URL
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
