# CI overlay - uses images from the current build
# Image tags are set via kustomize edit set image
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Add imagePullSecrets to all deployments for pulling from ghcr.io
patches:
  - path: imagepullsecrets-patch.yaml
    target:
      kind: Deployment

# Images will be patched by CI using:
# kustomize edit set image ghcr.io/angzarr-io/examples-rust-agg-player=ghcr.io/angzarr-io/examples-rust-agg-player:pr-N-sha
images:
  # Example app images
  - name: ghcr.io/angzarr-io/examples-rust-agg-player
    newTag: latest
  - name: ghcr.io/angzarr-io/examples-rust-agg-table
    newTag: latest
  - name: ghcr.io/angzarr-io/examples-rust-agg-hand
    newTag: latest
  - name: ghcr.io/angzarr-io/examples-rust-saga-table-hand
    newTag: latest
  - name: ghcr.io/angzarr-io/examples-rust-saga-hand-player
    newTag: latest
  - name: ghcr.io/angzarr-io/examples-rust-prj-output
    newTag: latest
  # Coordinator sidecar images (set by CI via kustomize edit set image)
  - name: ghcr.io/angzarr-io/angzarr-aggregate
    newTag: latest
  - name: ghcr.io/angzarr-io/angzarr-saga
    newTag: latest
  - name: ghcr.io/angzarr-io/angzarr-projector
    newTag: latest
  - name: ghcr.io/angzarr-io/angzarr-grpc-gateway
    newTag: latest
