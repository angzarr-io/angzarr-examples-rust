# Kind cluster configuration for acceptance tests
# Usage: kind create cluster --config deploy/kind/cluster.yaml --name angzarr-test
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    # Expose ports for gateway and stream services
    extraPortMappings:
      - containerPort: 30084  # Gateway NodePort
        hostPort: 9084
        protocol: TCP
      - containerPort: 31340  # Stream NodePort
        hostPort: 1340
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      [plugins."io.containerd.grpc.v1.cri".registry.mirrors]
        [plugins."io.containerd.grpc.v1.cri".registry.mirrors."ghcr.io"]
          endpoint = ["https://ghcr.io"]
