apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: angzarr-examples-rust

build:
  tagPolicy:
    gitCommit:
      prefix: "dev-"
      variant: AbbrevCommitSha
  local:
    push: false
    useBuildkit: true
    useDockerCLI: true
    concurrency: 4
  artifacts:
    # Player Aggregate
    - image: ghcr.io/angzarr-io/examples-rust-agg-player
      context: .
      docker:
        dockerfile: Containerfile
        target: agg-player

    # Table Aggregate
    - image: ghcr.io/angzarr-io/examples-rust-agg-table
      context: .
      docker:
        dockerfile: Containerfile
        target: agg-table

    # Hand Aggregate
    - image: ghcr.io/angzarr-io/examples-rust-agg-hand
      context: .
      docker:
        dockerfile: Containerfile
        target: agg-hand

    # Table->Hand Saga
    - image: ghcr.io/angzarr-io/examples-rust-saga-table-hand
      context: .
      docker:
        dockerfile: Containerfile
        target: saga-table-hand

    # Table->Player Saga
    - image: ghcr.io/angzarr-io/examples-rust-saga-table-player
      context: .
      docker:
        dockerfile: Containerfile
        target: saga-table-player

    # Hand->Table Saga
    - image: ghcr.io/angzarr-io/examples-rust-saga-hand-table
      context: .
      docker:
        dockerfile: Containerfile
        target: saga-hand-table

    # Hand->Player Saga
    - image: ghcr.io/angzarr-io/examples-rust-saga-hand-player
      context: .
      docker:
        dockerfile: Containerfile
        target: saga-hand-player

    # Tournament Aggregate
    - image: ghcr.io/angzarr-io/examples-rust-agg-tournament
      context: .
      docker:
        dockerfile: Containerfile
        target: agg-tournament

    # Hand Flow Process Manager
    - image: ghcr.io/angzarr-io/examples-rust-pmg-hand-flow
      context: .
      docker:
        dockerfile: Containerfile
        target: pmg-hand-flow

    # Buy-In Orchestrator Process Manager
    - image: ghcr.io/angzarr-io/examples-rust-pmg-buy-in
      context: .
      docker:
        dockerfile: Containerfile
        target: pmg-buy-in

    # Registration Orchestrator Process Manager
    - image: ghcr.io/angzarr-io/examples-rust-pmg-registration
      context: .
      docker:
        dockerfile: Containerfile
        target: pmg-registration

    # Rebuy Orchestrator Process Manager
    - image: ghcr.io/angzarr-io/examples-rust-pmg-rebuy
      context: .
      docker:
        dockerfile: Containerfile
        target: pmg-rebuy

    # Output Projector
    - image: ghcr.io/angzarr-io/examples-rust-prj-output
      context: .
      docker:
        dockerfile: Containerfile
        target: prj-output

    # Player UPC (Unit of Partition Coordinator)
    - image: ghcr.io/angzarr-io/examples-rust-upc-player
      context: .
      docker:
        dockerfile: Containerfile
        target: upc-player

profiles:
  # Kind profile - load images directly into Kind cluster
  - name: kind
    build:
      local:
        push: false
        useBuildkit: true
        useDockerCLI: true

  # CI profile - push to registry
  - name: ci
    build:
      local:
        push: true
        useBuildkit: true
        useDockerCLI: true
        concurrency: 4

  # Dev profile - fast iteration with hot reload
  - name: dev
    build:
      local:
        push: false
        useBuildkit: true
        useDockerCLI: true
        concurrency: 1
