apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: angzarr-examples-rust

build:
  tagPolicy:
    gitCommit:
      prefix: "dev-"
      variant: AbbrevCommitSha
  local:
    push: false
    useBuildkit: true
    concurrency: 4
  artifacts:
    # Player Aggregate
    - image: ghcr.io/angzarr-io/examples-rust-agg-player
      context: .
      docker:
        dockerfile: Containerfile
        target: agg-player

    # Table Aggregate
    - image: ghcr.io/angzarr-io/examples-rust-agg-table
      context: .
      docker:
        dockerfile: Containerfile
        target: agg-table

    # Hand Aggregate
    - image: ghcr.io/angzarr-io/examples-rust-agg-hand
      context: .
      docker:
        dockerfile: Containerfile
        target: agg-hand

    # Table->Hand Saga
    - image: ghcr.io/angzarr-io/examples-rust-saga-table-hand
      context: .
      docker:
        dockerfile: Containerfile
        target: saga-table-hand

    # Table->Player Saga
    - image: ghcr.io/angzarr-io/examples-rust-saga-table-player
      context: .
      docker:
        dockerfile: Containerfile
        target: saga-table-player

    # Hand->Table Saga
    - image: ghcr.io/angzarr-io/examples-rust-saga-hand-table
      context: .
      docker:
        dockerfile: Containerfile
        target: saga-hand-table

    # Hand->Player Saga
    - image: ghcr.io/angzarr-io/examples-rust-saga-hand-player
      context: .
      docker:
        dockerfile: Containerfile
        target: saga-hand-player

    # Hand Flow Process Manager
    - image: ghcr.io/angzarr-io/examples-rust-pmg-hand-flow
      context: .
      docker:
        dockerfile: Containerfile
        target: pmg-hand-flow

    # Output Projector
    - image: ghcr.io/angzarr-io/examples-rust-prj-output
      context: .
      docker:
        dockerfile: Containerfile
        target: prj-output

    # Player UPC (Unit of Partition Coordinator)
    - image: ghcr.io/angzarr-io/examples-rust-upc-player
      context: .
      docker:
        dockerfile: Containerfile
        target: upc-player

deploy:
  kubectl:
    manifests:
      - deploy/k8s/base/*.yaml

profiles:
  # Kind profile - load images directly into Kind cluster
  - name: kind
    build:
      local:
        push: false
    deploy:
      kubectl:
        manifests:
          - deploy/k8s/base/*.yaml
          - deploy/k8s/overlays/ci/*.yaml

  # CI profile - push to registry
  - name: ci
    build:
      local:
        push: true
        concurrency: 4

  # Dev profile - fast iteration with hot reload
  - name: dev
    build:
      local:
        push: false
        concurrency: 1
